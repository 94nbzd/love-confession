<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>💕 给你的一封信</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #1a0a0a;
    min-height: 100vh;
    font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Microsoft YaHei', sans-serif;
    overflow-x: hidden;
  }

  /* ===== 背景照片 ===== */
  .bg-photo {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background-image: url('gf-photo-compressed.jpg');
    background-size: cover;
    background-position: center;
    filter: blur(0px) brightness(0.3);
    transition: filter 2s;
    z-index: 0;
  }

  /* ===== 粒子画布 ===== */
  #canvas {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    z-index: 1;
    pointer-events: none;
  }

  /* ===== 第一屏：点击开始 ===== */
  .screen-start {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    z-index: 10;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    cursor: pointer;
  }

  .screen-start .main-title {
    font-size: 3rem;
    color: white;
    text-shadow: 0 0 30px rgba(255,100,150,0.8);
    animation: glow 2s ease-in-out infinite alternate;
    margin-bottom: 30px;
    text-align: center;
    padding: 0 20px;
  }

  .screen-start .hint-text {
    font-size: 1.2rem;
    color: rgba(255,255,255,0.6);
    animation: bounce 2s ease-in-out infinite;
  }

  @keyframes glow {
    from { text-shadow: 0 0 20px rgba(255,100,150,0.6); }
    to { text-shadow: 0 0 50px rgba(255,100,150,1), 0 0 80px rgba(255,100,150,0.5); }
  }

  @keyframes bounce {
    0%, 100% { transform: translateY(0); opacity: 0.6; }
    50% { transform: translateY(8px); opacity: 1; }
  }

  /* ===== 第二屏：表白内容 ===== */
  .screen-confess {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    z-index: 10;
    display: none;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 20px;
    opacity: 0;
    transition: opacity 1.5s;
  }

  .screen-confess.show {
    display: flex;
  }

  .screen-confess.visible {
    opacity: 1;
  }

  /* 头像圆框 */
  .avatar-wrap {
    width: 120px;
    height: 120px;
    border-radius: 50%;
    border: 3px solid rgba(255,255,255,0.3);
    overflow: hidden;
    margin-bottom: 20px;
    box-shadow: 0 0 30px rgba(255,100,150,0.5);
    animation: avatarFloat 3s ease-in-out infinite;
  }

  .avatar-wrap img {
    width: 100%; height: 100%; object-fit: cover;
  }

  @keyframes avatarFloat {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-8px); }
  }

  /* 表白标题 */
  .confess-title {
    font-size: 2.5rem;
    color: white;
    text-shadow: 0 0 20px rgba(255,100,150,0.8);
    margin-bottom: 8px;
    text-align: center;
  }

  /* 计时器 */
  .timer {
    font-size: 1rem;
    color: rgba(255,255,255,0.7);
    margin-bottom: 25px;
    letter-spacing: 1px;
  }

  /* 文字内容卡片 */
  .story-card {
    background: rgba(0,0,0,0.45);
    backdrop-filter: blur(12px);
    border-radius: 16px;
    padding: 25px 28px;
    max-width: 500px;
    width: 100%;
    border: 1px solid rgba(255,255,255,0.1);
    margin-bottom: 20px;
  }

  .story-line {
    font-size: 1.1rem;
    color: rgba(255,255,255,0.9);
    line-height: 2;
    margin-bottom: 8px;
    opacity: 0;
    transform: translateY(15px);
    transition: opacity 0.8s, transform 0.8s;
  }

  .story-line.show {
    opacity: 1;
    transform: translateY(0);
  }

  .story-line.highlight {
    color: #ff8ab5;
    font-size: 1.3rem;
    text-align: center;
    margin-top: 10px;
  }

  /* 爱心反应 */
  .heart-big {
    font-size: 3.5rem;
    cursor: pointer;
    opacity: 0;
    transition: opacity 0.5s;
    animation: none;
    display: inline-block;
    margin: 5px 0 10px;
  }

  .heart-big.show {
    opacity: 1;
    animation: heartbeat 1s ease-in-out infinite;
  }

  @keyframes heartbeat {
    0%, 100% { transform: scale(1); }
    25% { transform: scale(1.4); }
    50% { transform: scale(1); }
    75% { transform: scale(1.4); }
  }

  /* 署名 */
  .signature {
    font-size: 1rem;
    color: rgba(255,255,255,0.5);
    opacity: 0;
    transition: opacity 1s;
  }

  .signature.show { opacity: 1; }

  /* 音乐按钮 */
  .music-btn {
    position: fixed;
    top: 16px;
    right: 16px;
    z-index: 20;
    background: rgba(255,255,255,0.1);
    border: 1px solid rgba(255,255,255,0.2);
    color: white;
    width: 42px;
    height: 42px;
    border-radius: 50%;
    font-size: 16px;
    cursor: pointer;
    backdrop-filter: blur(8px);
    transition: background 0.3s;
    display: none;
  }

  .music-btn.show { display: block; }
  .music-btn:active { background: rgba(255,255,255,0.2); }

  /* 响应式 */
  @media (max-width: 600px) {
    .screen-start .main-title { font-size: 2rem; }
    .confess-title { font-size: 1.8rem; }
    .story-line { font-size: 1rem; }
    .story-line.highlight { font-size: 1.1rem; }
    .avatar-wrap { width: 90px; height: 90px; }
  }
</style>
</head>
<body>

<!-- 背景照片 -->
<div class="bg-photo" id="bgPhoto"></div>

<!-- 粒子画布 -->
<canvas id="canvas"></canvas>

<!-- 音乐按钮 -->
<button class="music-btn" id="musicBtn" onclick="toggleMusic()">🎵</button>

<!-- 第一屏：点击开始 -->
<div class="screen-start" id="screenStart" onclick="startConfession()">
  <div class="main-title">💕 给你的一封信 💕</div>
  <div class="hint-text">👇 点击屏幕开始 👇</div>
</div>

<!-- 第二屏：表白内容 -->
<div class="screen-confess" id="screenConfess">
  <div class="avatar-wrap">
    <img src="gf-photo-compressed.jpg" alt="她">
  </div>
  <div class="confess-title">💕 我喜欢你 💕</div>
  <div class="timer">我们在一起 <span id="daysCount">--</span> 天啦</div>

  <div class="story-card">
    <div class="story-line" data-delay="0">To: 婷婷 💐</div>
    <div class="story-line" data-delay="1">遇见你，是我最美丽的意外。</div>
    <div class="story-line" data-delay="2">你的笑容，是我每天醒来的理由。</div>
    <div class="story-line" data-delay="3">和你在一起的每一秒，</div>
    <div class="story-line" data-delay="4">都让我想要更多。</div>
    <div class="story-line" data-delay="5">谢谢你走进我的世界，</div>
    <div class="story-line" data-delay="6">愿意陪我笑，陪我闹，陪我成长。</div>
    <div class="story-line" data-delay="7">我想牵着你的手，</div>
    <div class="story-line" data-delay="8">一直走下去。</div>
    <div class="story-line highlight" data-delay="9">我想牵着你的手，一直走下去 ❤️</div>
  </div>

  <div class="heart-big" id="heartBig" onclick="burstHeart()">💖</div>
  <div class="signature" id="signature">—— 永远爱你的人</div>
</div>

<!-- 背景音乐 -->
<audio id="bgMusic" loop preload="none">
  <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-3.mp3" type="audio/mpeg">
</audio>

<script>
// ====== 计时器 ======
function updateTimer() {
  const together = new Date();
  together.setFullYear(2025, 5, 15); // 2025年6月15日
  together.setHours(0, 0, 0, 0);
  const now = new Date();
  const diff = Math.floor((now - together) / (1000 * 60 * 60 * 24));
  document.getElementById('daysCount').textContent = diff > 0 ? diff : 0;
}
updateTimer();

// ====== 表白主函数 ======
var musicPlaying = false;

function startConfession() {
  var screenStart = document.getElementById('screenStart');
  var screenConfess = document.getElementById('screenConfess');
  var bgPhoto = document.getElementById('bgPhoto');
  var musicBtn = document.getElementById('musicBtn');

  // 隐藏第一屏
  screenStart.style.display = 'none';

  // 显示第二屏
  screenConfess.style.display = 'flex';
  bgPhoto.style.filter = 'blur(0px) brightness(0.35)';
  musicBtn.classList.add('show');

  // 播放音乐
  var music = document.getElementById('bgMusic');
  music.play().then(function() {
    musicPlaying = true;
  }).catch(function() {
    // 浏览器自动播放限制，静默失败
  });

  // 淡入
  setTimeout(function() {
    screenConfess.classList.add('visible');
  }, 50);

  // 依次显示文字
  var lines = document.querySelectorAll('.story-line');
  lines.forEach(function(line) {
    var delay = parseInt(line.getAttribute('data-delay')) * 600;
    setTimeout(function() {
      line.classList.add('show');
    }, 1500 + delay);
  });

  // 显示爱心
  setTimeout(function() {
    document.getElementById('heartBig').classList.add('show');
  }, 1500 + lines.length * 600 + 500);

  // 显示署名
  setTimeout(function() {
    document.getElementById('signature').classList.add('show');
  }, 1500 + lines.length * 600 + 1500);
}

// ====== 音乐开关 ======
function toggleMusic() {
  var music = document.getElementById('bgMusic');
  var btn = document.getElementById('musicBtn');
  if (music.paused) {
    music.play();
    musicPlaying = true;
    btn.textContent = '🎵';
  } else {
    music.pause();
    musicPlaying = false;
    btn.textContent = '🔇';
  }
}

// ====== 爱心爆发 ======
function burstHeart() {
  var heartBig = document.getElementById('heartBig');
  heartBig.style.animation = 'none';
  heartBig.offsetHeight; // 触发重排，重置动画
  heartBig.style.animation = 'heartburst 0.6s ease-out';

  // 额外生成文字泡泡
  var emojis = ['❤️', '💕', '💗', '💖', '💝', '🌸', '✨'];
  for (var i = 0; i < 12; i++) {
    var el = document.createElement('div');
    el.textContent = emojis[Math.floor(Math.random() * emojis.length)];
    el.style.position = 'fixed';
    el.style.left = (30 + Math.random() * 40) + '%';
    el.style.top = (30 + Math.random() * 30) + '%';
    el.style.fontSize = (1 + Math.random() * 1.5) + 'rem';
    el.style.zIndex = '30';
    el.style.pointerEvents = 'none';
    el.style.transition = 'all 1.5s ease-out';
    el.style.opacity = '1';
    document.body.appendChild(el);
    setTimeout(function() {
      el.style.transform = 'translateY(-' + (80 + Math.random() * 60) + 'px)';
      el.style.opacity = '0';
    }, 50);
    setTimeout(function() {
      document.body.removeChild(el);
    }, 1600);
  }
}

// 在CSS里加一个burst动画
var style = document.createElement('style');
style.textContent = '@keyframes heartburst { 0%{transform:scale(1)} 50%{transform:scale(1.8)} 100%{transform:scale(1)} }';
document.head.appendChild(style);

// ====== 爱心粒子系统（简化版，稳定运行）======
var canvas = document.getElementById('canvas');
var ctx = canvas.getContext('2d');
var particles = [];

function resizeCanvas() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
resizeCanvas();
window.addEventListener('resize', resizeCanvas);

// 心形参数
var W, H;
function updateSize() {
  W = canvas.width;
  H = canvas.height;
}
updateSize();

function heartShape(t) {
  var x = 16 * Math.pow(Math.sin(t), 3);
  var y = -(13 * Math.cos(t) - 5 * Math.cos(2*t) - 2 * Math.cos(3*t) - Math.cos(4*t));
  return [x, y];
}

var centerX, centerY, scale;
function updateHeart() {
  centerX = W / 2;
  centerY = H / 2 - H * 0.05;
  scale = Math.min(W, H) / 28;
}

var phase = 0;
var heartPoints = [];
for (var i = 0; i < 800; i++) {
  var t = (i / 800) * Math.PI * 2;
  var p = heartShape(t);
  heartPoints.push({
    ox: p[0], oy: p[1],
    x: centerX + p[0] * scale,
    y: centerY + p[1] * scale,
    color: 'hsla(' + (i * 0.5) + ',100%,70%,0.6)'
  });
}

function initParticles() {
  particles = [];
  for (var i = 0; i < 300; i++) {
    particles.push({
      x: Math.random() * W,
      y: Math.random() * H,
      vx: (Math.random() - 0.5) * 0.5,
      vy: (Math.random() - 0.5) * 0.5,
      size: Math.random() * 2 + 0.5,
      color: 'hsla(0,0%,100%,' + (Math.random() * 0.3 + 0.1) + ')'
    });
  }
}
initParticles();

function animate() {
  ctx.fillStyle = 'rgba(0,0,0,0.08)';
  ctx.fillRect(0, 0, W, H);

  phase += 0.008;
  var beat = 1 + Math.sin(phase * 3) * 0.04;

  updateHeart();
  updateSize();

  // 画心形粒子
  for (var i = 0; i < heartPoints.length; i++) {
    var p = heartPoints[i];
    var px = centerX + p.ox * scale * beat;
    var py = centerY + p.oy * scale * beat;

    ctx.beginPath();
    ctx.arc(px, py, 1.2, 0, Math.PI * 2);
    ctx.fillStyle = p.color;
    ctx.fill();
  }

  // 画漂浮粒子
  for (var i = 0; i < particles.length; i++) {
    var p = particles[i];
    p.x += p.vx;
    p.y += p.vy;
    if (p.x < 0 || p.x > W) p.vx *= -1;
    if (p.y < 0 || p.y > H) p.vy *= -1;

    ctx.beginPath();
    ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
    ctx.fillStyle = p.color;
    ctx.fill();
  }

  requestAnimationFrame(animate);
}
animate();

// ====== 触摸支持 ======
document.addEventListener('touchstart', function(e) {
  var screenStart = document.getElementById('screenStart');
  if (screenStart.style.display !== 'none') {
    e.preventDefault();
    startConfession();
  }
}, { passive: false });
</script>

</body>
</html>
