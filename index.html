<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>💕 给你的一封信</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #1a0a0a;
    min-height: 100vh;
    font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Microsoft YaHei', sans-serif;
    overflow-x: hidden;
  }

  /* ===== 背景照片 ===== */
  #bgImg {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    object-fit: cover;
    filter: blur(0px) brightness(0.3);
    transition: filter 2s;
    z-index: 0;
  }

  /* ===== 粒子画布 ===== */
  #heart-canvas {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    z-index: 1;
    pointer-events: none;
  }
  #firework-canvas {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    z-index: 2;
    pointer-events: none;
  }

  /* ===== 第一屏：点击开始 ===== */
  .screen-start {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    z-index: 10;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    cursor: pointer;
  }

  .screen-start .main-title {
    font-size: 3rem;
    color: white;
    text-shadow: 0 0 30px rgba(255,100,150,0.8);
    animation: glow 2s ease-in-out infinite alternate;
    margin-bottom: 30px;
    text-align: center;
    padding: 0 20px;
  }

  .screen-start .hint-text {
    font-size: 1.2rem;
    color: rgba(255,255,255,0.6);
    animation: bounce 2s ease-in-out infinite;
  }

  @keyframes glow {
    from { text-shadow: 0 0 20px rgba(255,100,150,0.6); }
    to { text-shadow: 0 0 50px rgba(255,100,150,1), 0 0 80px rgba(255,100,150,0.5); }
  }

  @keyframes bounce {
    0%, 100% { transform: translateY(0); opacity: 0.6; }
    50% { transform: translateY(8px); opacity: 1; }
  }

  /* ===== 第二屏：表白内容 ===== */
  .screen-confess {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    z-index: 10;
    display: none;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 20px;
    opacity: 0;
    transition: opacity 1.5s;
    overflow-y: auto;
  }

  .screen-confess.show { display: flex; }
  .screen-confess.visible { opacity: 1; }

  .avatar-wrap {
    width: 120px;
    height: 120px;
    border-radius: 50%;
    border: 3px solid rgba(255,255,255,0.3);
    overflow: hidden;
    margin-bottom: 20px;
    box-shadow: 0 0 30px rgba(255,100,150,0.5);
    animation: avatarFloat 3s ease-in-out infinite;
    flex-shrink: 0;
  }

  .avatar-wrap img { width: 100%; height: 100%; object-fit: cover; }

  @keyframes avatarFloat {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-8px); }
  }

  .confess-title {
    font-size: 2.5rem;
    color: white;
    text-shadow: 0 0 20px rgba(255,100,150,0.8);
    margin-bottom: 8px;
    text-align: center;
    flex-shrink: 0;
  }

  .timer {
    font-size: 1rem;
    color: rgba(255,255,255,0.7);
    margin-bottom: 25px;
    letter-spacing: 1px;
    flex-shrink: 0;
  }

  .story-card {
    background: rgba(0,0,0,0.45);
    backdrop-filter: blur(12px);
    border-radius: 16px;
    padding: 25px 28px;
    max-width: 500px;
    width: 100%;
    border: 1px solid rgba(255,255,255,0.1);
    margin-bottom: 20px;
    flex-shrink: 0;
  }

  .story-line {
    font-size: 1.1rem;
    color: rgba(255,255,255,0.9);
    line-height: 2;
    margin-bottom: 8px;
    opacity: 0;
    transform: translateY(15px);
    transition: opacity 0.8s, transform 0.8s;
  }

  .story-line.show { opacity: 1; transform: translateY(0); }

  .story-line.highlight {
    color: #ff8ab5;
    font-size: 1.3rem;
    text-align: center;
    margin-top: 10px;
  }

  .heart-big {
    font-size: 3.5rem;
    cursor: pointer;
    opacity: 0;
    animation: none;
    display: inline-block;
    margin: 5px 0 10px;
    transition: opacity 0.5s;
    flex-shrink: 0;
  }

  .heart-big.show {
    opacity: 1;
    animation: heartbeat 1s ease-in-out infinite;
  }

  @keyframes heartbeat {
    0%, 100% { transform: scale(1); }
    25% { transform: scale(1.4); }
    50% { transform: scale(1); }
    75% { transform: scale(1.4); }
  }

  @keyframes heartburst {
    0% { transform: scale(1); }
    50% { transform: scale(1.8); }
    100% { transform: scale(1); }
  }

  .signature {
    font-size: 1rem;
    color: rgba(255,255,255,0.5);
    opacity: 0;
    transition: opacity 1s;
    flex-shrink: 0;
    margin-top: 5px;
  }

  .signature.show { opacity: 1; }

  .music-btn {
    position: fixed;
    top: 16px;
    right: 16px;
    z-index: 20;
    background: rgba(255,255,255,0.1);
    border: 1px solid rgba(255,255,255,0.2);
    color: white;
    width: 42px;
    height: 42px;
    border-radius: 50%;
    font-size: 16px;
    cursor: pointer;
    backdrop-filter: blur(8px);
    display: none;
  }

  .music-btn.show { display: block; }

  @media (max-width: 600px) {
    .screen-start .main-title { font-size: 2rem; }
    .confess-title { font-size: 1.8rem; }
    .story-line { font-size: 1rem; }
    .story-line.highlight { font-size: 1.1rem; }
    .avatar-wrap { width: 90px; height: 90px; }
    .story-card { padding: 18px 20px; }
  }
</style>
</head>
<body>

<!-- 背景照片 -->
<img id="bgImg" src="https://raw.githubusercontent.com/94nbzd/love-confession/main/gf-photo-compressed.jpg" alt="" style="display:none;">

<!-- 粒子画布 -->
<canvas id="heart-canvas"></canvas>
<canvas id="firework-canvas"></canvas>

<!-- 音乐按钮 -->
<button class="music-btn" id="musicBtn" onclick="toggleMusic()">🎵</button>

<!-- 第一屏：点击开始 -->
<div class="screen-start" id="screenStart" onclick="startConfession()">
  <div class="main-title">💕 给你的一封信 💕</div>
  <div class="hint-text">👇 点击屏幕开始 👇</div>
</div>

<!-- 第二屏：表白内容 -->
<div class="screen-confess" id="screenConfess">
  <div class="avatar-wrap">
    <img id="avatarImg" src="https://raw.githubusercontent.com/94nbzd/love-confession/main/gf-photo-compressed.jpg" alt="婷婷">
  </div>
  <div class="confess-title">💕 我喜欢你 💕</div>
  <div class="timer">我们在一起 <span id="daysCount">--</span> 天啦</div>

  <div class="story-card">
    <div class="story-line" data-delay="0">To: 婷婷 💐</div>
    <div class="story-line" data-delay="1">遇见你，是我最美丽的意外。</div>
    <div class="story-line" data-delay="2">你的笑容，是我每天醒来的理由。</div>
    <div class="story-line" data-delay="3">和你在一起的每一秒，</div>
    <div class="story-line" data-delay="4">都让我想要更多。</div>
    <div class="story-line" data-delay="5">谢谢你走进我的世界，</div>
    <div class="story-line" data-delay="6">愿意陪我笑，陪我闹，陪我成长。</div>
    <div class="story-line" data-delay="7">我想牵着你的手，</div>
    <div class="story-line" data-delay="8">一直走下去。</div>
    <div class="story-line highlight" data-delay="9">永远爱你，婷婷 ❤️</div>
  </div>

  <div class="heart-big" id="heartBig" onclick="burstHeart()">💖</div>
  <div class="signature" id="signature">—— 灿灿</div>
</div>

<!-- 背景音乐 -->
<audio id="bgMusic" loop preload="auto">
  <source id="musicSrc" type="audio/mpeg">
</audio>

<script>
// ====== 背景照片加载 ======
var IMG_DATA = 'https://raw.githubusercontent.com/94nbzd/love-confession/main/gf-photo-compressed.jpg';
var MUSIC_DATA = 'https://raw.githubusercontent.com/94nbzd/love-confession/main/bg-music.mp3';

var bgImg = document.getElementById('bgImg');
bgImg.onload = function() {
  bgImg.style.display = 'block';
};

// 如果照片已缓存，直接显示
if (bgImg.complete) {
  bgImg.style.display = 'block';
}

// 设置头像
document.getElementById('avatarImg').src = IMG_DATA;

// 设置音乐
document.getElementById('musicSrc').src = MUSIC_DATA;
document.getElementById('bgMusic').load();

// ====== 计时器 ======
function updateTimer() {
  var together = new Date();
  together.setFullYear(2025, 5, 15); // 2025年6月15日
  together.setHours(0, 0, 0, 0);
  var now = new Date();
  var diff = Math.floor((now - together) / (1000 * 60 * 60 * 24));
  document.getElementById('daysCount').textContent = diff > 0 ? diff : 0;
}
updateTimer();

// ====== 表白主函数 ======
function startConfession() {
  var screenStart = document.getElementById('screenStart');
  var screenConfess = document.getElementById('screenConfess');
  var bgPhoto = document.getElementById('bgImg');
  var musicBtn = document.getElementById('musicBtn');
  var music = document.getElementById('bgMusic');

  screenStart.style.display = 'none';
  screenConfess.classList.add('show');
  bgPhoto.style.filter = 'blur(0px) brightness(0.35)';
  musicBtn.classList.add('show');

  // 播放音乐
  var tryPlay = function() {
    music.play().catch(function() {});
  };
  tryPlay();

  setTimeout(function() {
    screenConfess.classList.add('visible');
  }, 50);

  // 依次显示文字
  var lines = document.querySelectorAll('.story-line');
  lines.forEach(function(line) {
    var delay = parseInt(line.getAttribute('data-delay')) * 600;
    setTimeout(function() {
      line.classList.add('show');
    }, 1500 + delay);
  });

  // 显示爱心
  setTimeout(function() {
    document.getElementById('heartBig').classList.add('show');
  }, 1500 + lines.length * 600 + 500);

  // 显示署名
  setTimeout(function() {
    document.getElementById('signature').classList.add('show');
  }, 1500 + lines.length * 600 + 1500);
}

// ====== 音乐开关 ======
function toggleMusic() {
  var music = document.getElementById('bgMusic');
  var btn = document.getElementById('musicBtn');
  if (music.paused) {
    music.play();
    btn.textContent = '🎵';
  } else {
    music.pause();
    btn.textContent = '🔇';
  }
}

// ====== 爱心爆发 ======
function burstHeart() {
  var heartBig = document.getElementById('heartBig');
  heartBig.style.animation = 'none';
  heartBig.offsetHeight;
  heartBig.style.animation = 'heartburst 0.6s ease-out';
  setTimeout(function() {
    heartBig.style.animation = 'heartbeat 1s ease-in-out infinite';
  }, 700);

  var emojis = ['❤️','💕','💗','💖','💝','🌸','✨'];
  for (var i = 0; i < 12; i++) {
    var el = document.createElement('div');
    el.textContent = emojis[Math.floor(Math.random() * emojis.length)];
    el.style.cssText = 'position:fixed;left:' + (20 + Math.random() * 60) + '%;top:' + (20 + Math.random() * 40) + '%;font-size:' + (1 + Math.random() * 1.5) + 'rem;z-index:30;pointer-events:none;transition:all 1.5s ease-out;opacity:1;';
    document.body.appendChild(el);
    setTimeout(function(e) {
      e.style.transform = 'translateY(-' + (80 + Math.random() * 60) + 'px)';
      e.style.opacity = '0';
    }, 50);
    setTimeout(function(e) { document.body.removeChild(e); }, 1600);
  }
}

// ====== 爱心粒子动画 ======
(function() {
  var canvas = document.getElementById('heart-canvas');
  var ctx = canvas.getContext('2d');
  var W, H, cx, cy, s;
  var phase = 0;

  function resize() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
    W = canvas.width;
    H = canvas.height;
    cx = W / 2;
    cy = H / 2 - H * 0.05;
    s = Math.min(W, H) / 28;
  }
  resize();
  window.addEventListener('resize', resize);

  function heartShape(t) {
    var x = 16 * Math.pow(Math.sin(t), 3);
    var y = -(13 * Math.cos(t) - 5 * Math.cos(2*t) - 2 * Math.cos(3*t) - Math.cos(4*t));
    return [x, y];
  }

  var heartPoints = [];
  for (var i = 0; i < 800; i++) {
    var t = (i / 800) * Math.PI * 2;
    var p = heartShape(t);
    heartPoints.push({
      ox: p[0], oy: p[1],
      color: 'hsla(' + (i * 0.5) + ',100%,70%,0.7)'
    });
  }

  var particles = [];
  for (var i = 0; i < 150; i++) {
    particles.push({
      x: Math.random() * W, y: Math.random() * H,
      vx: (Math.random() - 0.5) * 0.5,
      vy: (Math.random() - 0.5) * 0.5,
      size: Math.random() * 2 + 0.5,
      alpha: Math.random() * 0.3 + 0.1
    });
  }

  function animate() {
    ctx.fillStyle = 'rgba(0,0,0,0.08)';
    ctx.fillRect(0, 0, W, H);

    phase += 0.008;
    var beat = 1 + Math.sin(phase * 3) * 0.04;

    for (var i = 0; i < heartPoints.length; i++) {
      var p = heartPoints[i];
      var px = cx + p.ox * s * beat;
      var py = cy + p.oy * s * beat;
      ctx.beginPath();
      ctx.arc(px, py, 1.2, 0, Math.PI * 2);
      ctx.fillStyle = p.color;
      ctx.fill();
    }

    for (var i = 0; i < particles.length; i++) {
      var p = particles[i];
      p.x += p.vx; p.y += p.vy;
      if (p.x < 0 || p.x > W) p.vx *= -1;
      if (p.y < 0 || p.y > H) p.vy *= -1;
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
      ctx.fillStyle = 'rgba(255,255,255,' + p.alpha + ')';
      ctx.fill();
    }

    animateFireworks();
    drawFireworks();
    requestAnimationFrame(animate);
  }
  animate();
})();
// ====== 烟花系统 ======
var fireworks = [];
var explosions = [];
var fwCanvas2 = document.getElementById('firework-canvas');
function resizeFireworkCanvas() {
  if (fwCanvas2) { fwCanvas2.width = window.innerWidth; fwCanvas2.height = window.innerHeight; }
}
resizeFireworkCanvas();
window.addEventListener('resize', resizeFireworkCanvas);
// 页面一打开立即发射多批发烟花，营造震撼的开场效果
var nextLaunch = 0;
// 第一波：立即发射5发烟花
for (var k = 0; k < 5; k++) {
  launchFirework();
}
// 第二波：200ms后再发射4发
setTimeout(function() {
  for (var k = 0; k < 4; k++) {
    launchFirework();
  }
}, 200);
// 第三波：450ms后再发射3发
setTimeout(function() {
  for (var k = 0; k < 3; k++) {
    launchFirework();
  }
}, 450);
nextLaunch = Date.now() + 800; // 800ms后开始正常间隔发射

var FIREWORK_COLORS = [
  '#ff4d4d','#ff9900','#ffee00','#00e676',
  '#00b0ff','#d500f9','#ff4081','#76ff03',
  '#ff6e40','#ffab40','#e040fb','#18ffff'
];

function launchFirework(x, y) {
  var color = FIREWORK_COLORS[Math.floor(Math.random() * FIREWORK_COLORS.length)];
  fireworks.push({
    x: x || Math.random() * window.innerWidth * 0.9 + window.innerWidth * 0.05,
    y: y || window.innerHeight,
    vy: -(Math.random() * 5 + 10),
    vx: (Math.random() - 0.5) * 2,
    color: color,
    trail: [],
    trailLen: 25
  });
}

function explodeFirework(fw) {
  var count = 150 + Math.floor(Math.random() * 80);
  var hue = Math.floor(Math.random() * 360);
  for (var i = 0; i < count; i++) {
    var angle = (i / count) * Math.PI * 2 + (Math.random() - 0.5) * 0.3;
    var speed = Math.random() * 8 + 3;
    var particleHue = hue + (Math.random() - 0.5) * 40;
    explosions.push({
      x: fw.x, y: fw.y,
      vx: Math.cos(angle) * speed + fw.vx * 0.3,
      vy: Math.sin(angle) * speed + fw.vy * 0.3,
      color: 'hsla(' + particleHue + ',100%,65%,1)',
      alpha: 1,
      decay: 0.012 + Math.random() * 0.012,
      size: Math.random() * 3 + 1.2
    });
  }
  // 中心亮斑 - 更亮更大
  for (var i = 0; i < 20; i++) {
    explosions.push({
      x: fw.x, y: fw.y,
      vx: (Math.random() - 0.5) * 4,
      vy: (Math.random() - 0.5) * 4,
      color: '#ffffff',
      alpha: 1,
      decay: 0.06 + Math.random() * 0.03,
      size: Math.random() * 5 + 2
    });
  }
  // 闪烁的星光
  for (var i = 0; i < 8; i++) {
    var angle = Math.random() * Math.PI * 2;
    var dist = Math.random() * 30 + 10;
    explosions.push({
      x: fw.x + Math.cos(angle) * dist,
      y: fw.y + Math.sin(angle) * dist,
      vx: Math.cos(angle) * 2,
      vy: Math.sin(angle) * 2,
      color: '#ffffff',
      alpha: 1,
      decay: 0.08,
      size: 3 + Math.random() * 4
    });
  }
}

function animateFireworks() {
  var now = Date.now();
  // 随机发射烟花（每 600-1500ms 一发）
  if (now > nextLaunch) {
    launchFirework();
    nextLaunch = now + 600 + Math.random() * 900;
  }

  // 更新上升中的烟花
  for (var i = fireworks.length - 1; i >= 0; i--) {
    var f = fireworks[i];
    f.trail.push({x: f.x, y: f.y});
    if (f.trail.length > f.trailLen) f.trail.shift();
    f.x += f.vx;
    f.y += f.vy;
    f.vy += 0.12; // 重力
    // 上升到一定高度后爆炸（vy接近0时表示到达顶点）
    if (f.vy >= -2.5) {
      explodeFirework(f);
      fireworks.splice(i, 1);
    }
  }

  // 更新爆炸粒子
  for (var i = explosions.length - 1; i >= 0; i--) {
    var p = explosions[i];
    p.x += p.vx;
    p.y += p.vy;
    p.vy += 0.08;
    p.vx *= 0.98;
    p.alpha -= p.decay;
    if (p.alpha <= 0) {
      explosions.splice(i, 1);
    }
  }
}

function drawFireworks() {
  var fwCanvas = document.getElementById('firework-canvas');
  var fwCtx = fwCanvas.getContext('2d');
  fwCtx.clearRect(0, 0, fwCanvas.width, fwCanvas.height);

  // 画上升中的烟花尾迹
  for (var i = 0; i < fireworks.length; i++) {
    var f = fireworks[i];
    for (var j = 0; j < f.trail.length; j++) {
      var t = f.trail[j];
      var alpha = j / f.trail.length * 0.7;
      var size = (j / f.trail.length) * 2.5 + 0.5;
      fwCtx.beginPath();
      fwCtx.arc(t.x, t.y, size, 0, Math.PI * 2);
      fwCtx.fillStyle = 'rgba(255,255,255,' + alpha + ')';
      fwCtx.fill();
    }
    // 烟花头部 - 发光效果
    fwCtx.beginPath();
    fwCtx.arc(f.x, f.y, 4, 0, Math.PI * 2);
    fwCtx.fillStyle = '#ffffff';
    fwCtx.shadowBlur = 15;
    fwCtx.shadowColor = f.color;
    fwCtx.fill();
    fwCtx.shadowBlur = 0;
    // 头部外发光
    fwCtx.beginPath();
    fwCtx.arc(f.x, f.y, 8, 0, Math.PI * 2);
    fwCtx.fillStyle = f.color;
    fwCtx.globalAlpha = 0.4;
    fwCtx.fill();
    fwCtx.globalAlpha = 1;
  }

  // 画爆炸粒子
  for (var i = 0; i < explosions.length; i++) {
    var p = explosions[i];
    fwCtx.save();
    fwCtx.globalAlpha = p.alpha;
    fwCtx.beginPath();
    fwCtx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
    fwCtx.fillStyle = p.color;
    fwCtx.shadowBlur = 12;
    fwCtx.shadowColor = p.color;
    fwCtx.fill();
    fwCtx.globalAlpha = p.alpha * 0.3;
    fwCtx.beginPath();
    fwCtx.arc(p.x, p.y, p.size * 2.5, 0, Math.PI * 2);
    fwCtx.fillStyle = p.color;
    fwCtx.fill();
    fwCtx.restore();
  }
}



// ====== 触摸支持 ======
document.addEventListener('touchstart', function(e) {
  var screenStart = document.getElementById('screenStart');
  if (screenStart.style.display !== 'none') {
    e.preventDefault();
    startConfession();
  }
}, { passive: false });
</script>

</body>
</html>
